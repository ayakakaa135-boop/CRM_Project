databases:
  - name: mayan-crm-db
    databaseName: crm_db
    user: crm_user
    plan: free

services:
  - type: web
    name: mayan-crm-api
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/docs/
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: mayan-crm-db
          property: connectionString
      - key: ALLOWED_HOSTS
        value: ".onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: SEED_DEMO_DATA
        value: "true"
      - key: DEMO_ADMIN_USERNAME
        value: "admin"
      - key: DEMO_ADMIN_PASSWORD
        sync: false
      - key: DEMO_ADMIN_EMAIL
        value: "admin@example.com"

  - type: web
    name: mayan-crm-web
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
