version: "3.9"

services:

  # ─── PostgreSQL ─────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-crm_db}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Django API ─────────────────────────────────────────────
  api:
    build:
      context: .
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST:     db
      DB_NAME:     crm_db
      DB_USER:     postgres
      DB_PASSWORD: postgres
      REDIS_URL:   redis://redis:6379/0
      DATABASE_URL: postgresql://postgres:postgres@db:5432/crm_db
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}
      DEMO_ADMIN_USERNAME: ${DEMO_ADMIN_USERNAME:-admin}
      DEMO_ADMIN_PASSWORD: ${DEMO_ADMIN_PASSWORD:-Admin123!pass}
      DEMO_ADMIN_EMAIL: ${DEMO_ADMIN_EMAIL:-admin@example.com}
    volumes:
      - media_data:/app/media
      - static_data:/app/staticfiles
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Frontend (React) ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - api

  # ─── Celery Worker ──────────────────────────────────────────
  celery_worker:
    build:
      context: .
    restart: unless-stopped
    command: celery -A config worker -l info -Q default
    env_file: .env
    environment:
      DB_HOST:     db
      DB_NAME:     crm_db
      DB_USER:     postgres
      DB_PASSWORD: postgres
      REDIS_URL:   redis://redis:6379/0
      DATABASE_URL: postgresql://postgres:postgres@db:5432/crm_db
    volumes:
      - media_data:/app/media
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Celery Beat ────────────────────────────────────────────
  celery_beat:
    build:
      context: .
    restart: unless-stopped
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    environment:
      DB_HOST:     db
      DB_NAME:     crm_db
      DB_USER:     postgres
      DB_PASSWORD: postgres
      REDIS_URL:   redis://redis:6379/0
      DATABASE_URL: postgresql://postgres:postgres@db:5432/crm_db
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Nginx (Reverse Proxy) ──────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    depends_on:
      - api
      - frontend

volumes:
  postgres_data:
  redis_data:
  media_data:
  static_data:
