<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>غير متصل — CRM</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: #f4f7f6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #2d3748;
    }

    .container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }

    .icon {
      font-size: 5rem;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.75rem;
      margin-bottom: 0.75rem;
      color: #1a6b3a;
    }

    p {
      color: #718096;
      line-height: 1.7;
      margin-bottom: 2rem;
    }

    button {
      background: #1a6b3a;
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #155a30; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>أنت غير متصل بالإنترنت</h1>
    <p>
      لا يمكن الوصول إلى النظام حالياً.<br>
      يرجى التحقق من اتصالك بالإنترنت والمحاولة مجدداً.
    </p>
    <button onclick="window.location.reload()">
      إعادة المحاولة
    </button>
  </div>
</body>
</html>
